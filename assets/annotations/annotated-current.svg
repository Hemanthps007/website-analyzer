<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'DM Sans', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F5F5F5"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="860" height="580" rx="10" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="20" y="20" width="860" height="36" rx="10" fill="#EAEAEA"/>
  <rect x="20" y="44" width="860" height="12" fill="#EAEAEA"/>
  <circle cx="44" cy="38" r="6" fill="#FF5F57"/>
  <circle cx="60" cy="38" r="6" fill="#FFBD2E"/>
  <circle cx="76" cy="38" r="6" fill="#28CA41"/>
  <rect x="100" y="30" width="580" height="16" rx="8" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <text x="390" y="42" text-anchor="middle" font-size="10" fill="#999">www.examplefoundation.org</text>

  <!-- SITE HEADER (bad) -->
  <rect x="20" y="56" width="860" height="44" fill="#1a3a5c"/>
  <text x="36" y="83" font-size="11" font-weight="700" fill="white">EXAMPLE FOUNDATION FOR COMMUNITY DEVELOPMENT AND EMPOWERMENT</text>
  <text x="620" y="82" font-size="9" fill="rgba(255,255,255,0.7)">HOME</text>
  <text x="660" y="82" font-size="9" fill="rgba(255,255,255,0.7)">ABOUT US</text>
  <text x="710" y="82" font-size="9" fill="rgba(255,255,255,0.7)">PROGRAMS</text>
  <text x="760" y="82" font-size="9" fill="rgba(255,255,255,0.7)">NEWS</text>
  <text x="795" y="82" font-size="9" fill="rgba(255,255,255,0.7)">CONTACT</text>
  <text x="835" y="82" font-size="9" fill="rgba(255,255,255,0.7)">DONATE</text>

  <!-- HERO SECTION (bad) -->
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2d6a9f"/>
    </linearGradient>
  </defs>
  <rect x="20" y="100" width="860" height="160" fill="url(#heroGrad)"/>
  <text x="450" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="white">Welcome to the Example Foundation for Community Development</text>
  <text x="450" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="white">and Empowerment</text>
  <text x="450" y="186" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">We are a non-profit organization dedicated to improving the lives of community members through various programs</text>
  <text x="450" y="200" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">and initiatives since 1998. Our work spans education, healthcare, and economic development.</text>
  <rect x="370" y="215" width="160" height="26" rx="3" fill="#e67e22"/>
  <text x="450" y="232" text-anchor="middle" font-size="10" fill="white" font-weight="600">Click Here to Learn More</text>

  <!-- BODY 3 columns (bad) -->
  <rect x="20" y="260" width="860" height="220" fill="#FAFAFA"/>
  <!-- Col 1 -->
  <rect x="36" y="276" width="268" height="188" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <text x="50" y="298" font-size="11" font-weight="700" fill="#1a3a5c">Our Programs</text>
  <text x="50" y="318" font-size="9" fill="#555">We run multiple community programs that help people in</text>
  <text x="50" y="331" font-size="9" fill="#555">need. These programs are funded by generous donations</text>
  <text x="50" y="344" font-size="9" fill="#555">from the public and corporate partners. Please consider</text>
  <text x="50" y="357" font-size="9" fill="#555">supporting our work through any means possible.</text>
  <!-- Col 2 -->
  <rect x="320" y="276" width="268" height="188" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <text x="334" y="298" font-size="11" font-weight="700" fill="#1a3a5c">Latest News</text>
  <text x="334" y="318" font-size="9" fill="#555">July 15, 2023 — Foundation Annual Report Released</text>
  <text x="334" y="334" font-size="9" fill="#888">June 30, 2023 — New Partnership Announced</text>
  <text x="334" y="350" font-size="9" fill="#888">May 12, 2023 — Community Day Event</text>
  <!-- Col 3 -->
  <rect x="604" y="276" width="268" height="188" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <text x="618" y="298" font-size="11" font-weight="700" fill="#1a3a5c">Contact Information</text>
  <text x="618" y="318" font-size="9" fill="#555">123 Foundation Street</text>
  <text x="618" y="332" font-size="9" fill="#555">City, State 00000</text>
  <text x="618" y="346" font-size="9" fill="#555">Tel: (000) 000-0000</text>
  <text x="618" y="360" font-size="9" fill="#555">Email: info@example.org</text>

  <!-- FOOTER (cluttered) -->
  <rect x="20" y="480" width="860" height="80" fill="#EEEEEE"/>
  <text x="36" y="500" font-size="10" font-weight="700" fill="#444">EXAMPLE FOUNDATION</text>
  <text x="36" y="514" font-size="8" fill="#888">123 Foundation St, City | © 2023 All Rights Reserved</text>
  <text x="280" y="500" font-size="8" fill="#888">Quick Links: Home | About | Programs | Donate | Contact | Privacy | Terms | Sitemap | Volunteer | Events</text>
  <text x="280" y="516" font-size="8" fill="#888">Facebook | Twitter | Instagram | LinkedIn | YouTube | Newsletter</text>

  <!-- ── ANNOTATION PINS ── -->
  <!-- Pin 1: Brand name -->
  <circle cx="200" cy="78" r="13" fill="#C84B2F"/>
  <text x="200" y="83" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <line x1="213" y1="78" x2="250" y2="48" stroke="#C84B2F" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="252" y="30" width="220" height="36" rx="6" fill="#C84B2F"/>
  <text x="362" y="46" text-anchor="middle" font-size="10" fill="white" font-weight="600">Brand name too long &amp; unreadable</text>
  <text x="362" y="58" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Use short name + icon for recognition</text>

  <!-- Pin 2: Donate button hidden -->
  <circle cx="848" cy="78" r="13" fill="#C84B2F"/>
  <text x="848" y="83" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <line x1="835" y1="78" x2="800" y2="48" stroke="#C84B2F" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="620" y="26" width="178" height="36" rx="6" fill="#C84B2F"/>
  <text x="709" y="42" text-anchor="middle" font-size="10" fill="white" font-weight="600">"Donate" lost in nav list</text>
  <text x="709" y="54" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Needs dedicated button styling</text>

  <!-- Pin 3: Hero headline -->
  <circle cx="450" cy="150" r="13" fill="#C84B2F"/>
  <text x="450" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <line x1="463" y1="150" x2="700" y2="120" stroke="#C84B2F" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="700" y="104" width="170" height="36" rx="6" fill="#C84B2F"/>
  <text x="785" y="120" text-anchor="middle" font-size="10" fill="white" font-weight="600">Headline leads with org name</text>
  <text x="785" y="132" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Lead with impact &amp; outcomes instead</text>

  <!-- Pin 4: Weak CTA -->
  <circle cx="450" cy="228" r="13" fill="#B8892A"/>
  <text x="450" y="233" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <line x1="437" y1="228" x2="220" y2="248" stroke="#B8892A" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="36" y="234" width="182" height="36" rx="6" fill="#B8892A"/>
  <text x="127" y="250" text-anchor="middle" font-size="10" fill="white" font-weight="600">"Click Here" — vague CTA</text>
  <text x="127" y="262" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Use specific action + outcome</text>

  <!-- Pin 5: Equal column problem -->
  <circle cx="170" cy="340" r="13" fill="#B8892A"/>
  <text x="170" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
  <line x1="157" y1="340" x2="36" y2="390" stroke="#B8892A" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="36" y="390" width="196" height="36" rx="6" fill="#B8892A"/>
  <text x="134" y="406" text-anchor="middle" font-size="10" fill="white" font-weight="600">No visual hierarchy in columns</text>
  <text x="134" y="418" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Programs, news &amp; contact = equal weight</text>

  <!-- Pin 6: Contact in body -->
  <circle cx="738" cy="340" r="13" fill="#2B4E6B"/>
  <text x="738" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="white">6</text>
  <line x1="751" y1="340" x2="840" y2="390" stroke="#2B4E6B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="690" y="390" width="188" height="36" rx="6" fill="#2B4E6B"/>
  <text x="784" y="406" text-anchor="middle" font-size="10" fill="white" font-weight="600">Contact info in body = unconventional</text>
  <text x="784" y="418" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Move to footer; use space for stories</text>

  <!-- Pin 7: Cluttered footer -->
  <circle cx="450" cy="510" r="13" fill="#B8892A"/>
  <text x="450" y="515" text-anchor="middle" font-size="10" font-weight="700" fill="white">7</text>
  <line x1="450" y1="497" x2="450" y2="460" stroke="#B8892A" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="340" y="435" width="220" height="36" rx="6" fill="#B8892A"/>
  <text x="450" y="451" text-anchor="middle" font-size="10" fill="white" font-weight="600">Footer: 10+ links, no hierarchy</text>
  <text x="450" y="463" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Needs grouped columns + trust signals</text>

  <!-- Low contrast warning box -->
  <rect x="20" y="556" width="860" height="44" rx="0" fill="#FEF0ED" stroke="#F0C0B5" stroke-width="1"/>
  <text x="36" y="574" font-size="10" fill="#C84B2F" font-weight="700">⚠ ACCESSIBILITY ISSUE DETECTED:</text>
  <text x="36" y="590" font-size="10" fill="#C84B2F">Text contrast ratio: 2.8:1 | Required (WCAG AA): 4.5:1 | Small text on light grey backgrounds fails completely</text>

  <!-- Legend -->
  <rect x="700" y="260" width="0" height="0"/>
</svg>
