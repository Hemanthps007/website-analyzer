<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'DM Sans', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F0F0EC"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="860" height="580" rx="10" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="20" y="20" width="860" height="36" rx="10" fill="#EAEAEA"/>
  <rect x="20" y="44" width="860" height="12" fill="#EAEAEA"/>
  <circle cx="44" cy="38" r="6" fill="#FF5F57"/>
  <circle cx="60" cy="38" r="6" fill="#FFBD2E"/>
  <circle cx="76" cy="38" r="6" fill="#28CA41"/>
  <rect x="100" y="30" width="580" height="16" rx="8" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <text x="390" y="42" text-anchor="middle" font-size="10" fill="#999">www.examplefoundation.org</text>

  <!-- IMPROVED HEADER -->
  <rect x="20" y="56" width="860" height="50" fill="white" stroke="#EEE" stroke-width="1"/>
  <text x="46" y="87" font-size="14" font-weight="700" fill="#1a3a5c">🌱 ExampleFoundation</text>
  <text x="520" y="86" font-size="11" fill="#555" font-weight="500">Our Work</text>
  <text x="590" y="86" font-size="11" fill="#555" font-weight="500">Our Impact</text>
  <text x="665" y="86" font-size="11" fill="#555" font-weight="500">Get Involved</text>
  <!-- Donate button - prominent -->
  <rect x="748" y="71" width="110" height="30" rx="7" fill="#C84B2F"/>
  <text x="803" y="90" text-anchor="middle" font-size="11" fill="white" font-weight="700">Donate →</text>

  <!-- IMPROVED HERO (two column) -->
  <rect x="20" y="106" width="860" height="170" fill="#F8F6F2"/>
  <!-- Left: text content -->
  <text x="50" y="140" font-size="20" font-weight="700" fill="#1A1714">Building stronger communities,</text>
  <text x="50" y="163" font-size="20" font-weight="700" fill="#1A1714">one life at a time</text>
  <text x="50" y="187" font-size="10" fill="#666">For 25 years, we've delivered education, healthcare, and economic</text>
  <text x="50" y="200" font-size="10" fill="#666">development programs to families who need it most.</text>
  <rect x="50" y="218" width="160" height="34" rx="8" fill="#C84B2F"/>
  <text x="130" y="240" text-anchor="middle" font-size="11" fill="white" font-weight="700">See Our Impact →</text>
  <!-- Right: image placeholder -->
  <rect x="540" y="116" width="320" height="150" rx="10" fill="#1a3a5c"/>
  <text x="700" y="190" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">📸 Real community</text>
  <text x="700" y="207" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">impact photography</text>

  <!-- IMPACT STATS BAR -->
  <rect x="20" y="276" width="860" height="54" fill="#1a3a5c"/>
  <text x="220" y="299" text-anchor="middle" font-size="18" font-weight="700" fill="white">12,400</text>
  <text x="220" y="316" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)">FAMILIES SERVED</text>
  <line x1="430" y1="285" x2="430" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="450" y="299" text-anchor="middle" font-size="18" font-weight="700" fill="white">$4.2M</text>
  <text x="450" y="316" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)">PROGRAMS FUNDED</text>
  <line x1="660" y1="285" x2="660" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="700" y="299" text-anchor="middle" font-size="18" font-weight="700" fill="white">97%</text>
  <text x="700" y="316" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)">FUND UTILIZATION</text>

