  <text x="48" y="411" font-size="9" fill="#777">for youth and adults in the community.</text>

  <rect x="320" y="348" width="260" height="90" rx="8" fill="white" stroke="#EEE" stroke-width="1"/>
  <rect x="332" y="360" width="30" height="30" rx="6" fill="#E4F5EC"/>
  <text x="347" y="380" text-anchor="middle" font-size="16">🏥</text>
  <text x="374" y="376" font-size="11" font-weight="700" fill="#1A1714">Healthcare Access</text>
  <text x="332" y="398" font-size="9" fill="#777">Free clinics, mental health support,</text>
  <text x="332" y="411" font-size="9" fill="#777">and preventive care programs.</text>

  <rect x="604" y="348" width="260" height="90" rx="8" fill="white" stroke="#EEE" stroke-width="1"/>
  <rect x="616" y="360" width="30" height="30" rx="6" fill="#FDF6E3"/>
  <text x="631" y="380" text-anchor="middle" font-size="16">💼</text>
  <text x="658" y="376" font-size="11" font-weight="700" fill="#1A1714">Economic Empowerment</text>
  <text x="616" y="398" font-size="9" fill="#777">Microloans, job training, and</text>
  <text x="616" y="411" font-size="9" fill="#777">entrepreneurship support.</text>

