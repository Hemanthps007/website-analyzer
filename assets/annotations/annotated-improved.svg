  <rect x="20" y="460" width="860" height="100" fill="#1A1714"/>
  <!-- Col 1 -->
  <text x="50" y="482" font-size="11" font-weight="700" fill="white">🌱 ExampleFoundation</text>
  <text x="50" y="498" font-size="9" fill="rgba(255,255,255,0.4)">Building communities since 1998</text>
  <text x="50" y="516" font-size="9" fill="rgba(255,255,255,0.4)">Registered Charity #12345</text>
  <text x="50" y="532" font-size="9" fill="rgba(255,255,255,0.4)">⭐ Guidestar Gold Seal</text>
  <!-- Col 2 -->
  <text x="300" y="482" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">Quick Links</text>
  <text x="300" y="498" font-size="9" fill="rgba(255,255,255,0.4)">Our Work · Our Impact</text>
  <text x="300" y="514" font-size="9" fill="rgba(255,255,255,0.4)">Get Involved · Annual Report</text>
  <!-- Col 3 -->
  <text x="540" y="482" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">Contact</text>
  <text x="540" y="498" font-size="9" fill="rgba(255,255,255,0.4)">info@example.org</text>
  <text x="540" y="514" font-size="9" fill="rgba(255,255,255,0.4)">Facebook · Instagram · LinkedIn</text>
  <!-- Col 4: Newsletter -->
  <text x="720" y="482" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">Stay Updated</text>
  <rect x="720" y="492" width="140" height="26" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <text x="790" y="509" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)">Enter your email...</text>

  <!-- ── IMPROVEMENT ANNOTATIONS ── (green checkmarks) -->

  <!-- Annotation A: Clear Donate CTA -->
  <circle cx="803" cy="86" r="13" fill="#2A6B4E"/>
  <text x="803" y="91" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>
  <line x1="803" y1="73" x2="803" y2="50" stroke="#2A6B4E" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="680" y="26" width="242" height="22" rx="5" fill="#2A6B4E"/>
  <text x="801" y="41" text-anchor="middle" font-size="9" fill="white" font-weight="600">✓ Prominent donate button — high contrast, always visible</text>

  <!-- Annotation B: Impact-led headline -->
  <circle cx="200" cy="152" r="13" fill="#2A6B4E"/>
  <text x="200" y="157" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>
  <line x1="187" y1="152" x2="36" y2="130" stroke="#2A6B4E" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="36" y="118" width="0" height="0"/>
  <!-- Label left side -->
  <rect x="700" y="108" width="168" height="22" rx="5" fill="#2A6B4E"/>
  <text x="784" y="123" text-anchor="middle" font-size="9" fill="white" font-weight="600">✓ Headline leads with mission outcome</text>

  <!-- Annotation C: Real photo -->
  <circle cx="700" cy="191" r="13" fill="#2A6B4E"/>
  <text x="700" y="196" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>

  <!-- Annotation D: Specific CTA -->
  <circle cx="130" cy="235" r="13" fill="#2A6B4E"/>
  <text x="130" y="240" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>
  <line x1="130" y1="248" x2="130" y2="266" stroke="#2A6B4E" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="36" y="268" width="186" height="22" rx="5" fill="#2A6B4E"/>
  <text x="129" y="283" text-anchor="middle" font-size="9" fill="white" font-weight="600">✓ Specific, action-oriented CTA text</text>

  <!-- Annotation E: Impact bar -->
  <circle cx="450" cy="303" r="13" fill="#2A6B4E"/>
  <text x="450" y="308" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>
  <line x1="450" y1="316" x2="450" y2="340" stroke="#2A6B4E" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="340" y="340" width="220" height="22" rx="5" fill="#2A6B4E"/>
  <text x="450" y="355" text-anchor="middle" font-size="9" fill="white" font-weight="600">✓ Social proof with real impact numbers</text>

  <!-- Annotation F: Program cards -->
  <circle cx="166" cy="393" r="13" fill="#2A6B4E"/>
  <text x="166" y="398" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>
  <line x1="166" y1="406" x2="166" y2="440" stroke="#2A6B4E" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="36" y="440" width="260" height="22" rx="5" fill="#2A6B4E"/>
  <text x="166" y="455" text-anchor="middle" font-size="9" fill="white" font-weight="600">✓ Structured cards with icon + description</text>

  <!-- Annotation G: Footer -->
  <circle cx="450" cy="490" r="13" fill="#2A6B4E"/>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="white" font-weight="700">✓</text>

  <!-- WCAG PASS banner -->
  <rect x="20" y="556" width="860" height="44" fill="#EDF8F3" stroke="#A8D4BC" stroke-width="1"/>
  <text x="36" y="574" font-size="10" fill="#2A6B4E" font-weight="700">✅ ACCESSIBILITY PASS:</text>
  <text x="36" y="590" font-size="10" fill="#2A6B4E">Text contrast ratio: 7.2:1 (body) | 5.1:1 (secondary) | Exceeds WCAG AA 4.5:1 minimum | Keyboard navigable | Screen reader tested</text>

</svg>
